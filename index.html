<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Planets — Merge the Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#020510;--panel:rgba(8,18,48,0.85);--border:rgba(100,160,255,0.2);--accent:#4af;--text:#cde;--text-dim:rgba(180,210,255,0.5);--glow:0 0 20px rgba(64,170,255,0.4)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
    #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    header{position:relative;z-index:10;text-align:center;padding:12px 0 6px}
    header h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:900;letter-spacing:.15em;background:linear-gradient(135deg,#4af 0%,#a4f 50%,#f4a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    header p{font-size:.7rem;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;margin-top:2px}
    #game-wrapper{position:relative;z-index:10;display:flex;gap:16px;align-items:flex-start;padding:8px}
    .side-panel{width:140px;display:flex;flex-direction:column;gap:12px}
    .panel-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;backdrop-filter:blur(10px)}
    .panel-box h3{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.25em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
    #score-val{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:700;color:#fff;text-shadow:var(--glow)}
    #best-val{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:400;color:var(--text-dim)}
    #next-canvas{width:100%;height:80px;display:block}
    #legend{display:flex;flex-direction:column;gap:5px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:.65rem;color:var(--text-dim)}
    #canvas-container{position:relative;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(64,140,255,.15),inset 0 0 60px rgba(0,0,10,.5)}
    #game-canvas{display:block;cursor:none}
    #drop-line{position:absolute;top:0;width:1px;pointer-events:none;border-left:1px dashed rgba(150,200,255,.25)}
    #cursor-planet{position:absolute;top:0;left:0;pointer-events:none;z-index:5}
    #danger-line{position:absolute;left:0;right:0;height:1px;background:rgba(255,80,80,.3);pointer-events:none}
    .btn{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--accent);cursor:pointer;width:100%;transition:all .2s}
    .btn:hover{background:rgba(64,170,255,.15);border-color:var(--accent);box-shadow:var(--glow)}
    .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(2,5,16,.88);backdrop-filter:blur(8px);z-index:20;border-radius:15px}
    .overlay h2{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:.1em;margin-bottom:8px}
    .overlay .score-big{font-family:'Orbitron',sans-serif;font-size:3rem;font-weight:700;color:var(--accent);text-shadow:var(--glow);margin-bottom:4px}
    .overlay p{color:var(--text-dim);font-size:.8rem;margin-bottom:20px}
    .overlay .btn{width:auto;padding:10px 28px;font-size:.75rem}
    #start-overlay .title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:linear-gradient(135deg,#4af,#a4f,#f4a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .instructions{color:var(--text-dim);font-size:.75rem;text-align:center;line-height:1.8;margin-bottom:20px}
    .instructions b{color:var(--accent);font-weight:600}
    .merge-flash{position:absolute;border-radius:50%;pointer-events:none;animation:flash-out .5s ease-out forwards;z-index:15}
    @keyframes flash-out{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
    .score-popup{position:absolute;pointer-events:none;font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;color:#fff;text-shadow:0 0 10px var(--accent);animation:pop-up 1s ease-out forwards;z-index:16}
    @keyframes pop-up{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<header>
  <h1>✦ LITTLE PLANETS ✦</h1>
  <p>Merge the Universe</p>
</header>
<div id="game-wrapper">
  <div class="side-panel">
    <div class="panel-box">
      <h3>Score</h3><div id="score-val">0</div>
      <h3 style="margin-top:8px">Best</h3><div id="best-val">0</div>
    </div>
    <div class="panel-box">
      <h3>Prochain</h3>
      <canvas id="next-canvas" width="120" height="80"></canvas>
    </div>
    <button class="btn" id="restart-btn">↺ Restart</button>
  </div>
  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
    <div id="drop-line"></div>
    <canvas id="cursor-planet"></canvas>
    <div id="danger-line"></div>
    <div class="overlay" id="start-overlay">
      <div class="title">LITTLE PLANETS</div>
      <div class="instructions">
        <b>Cliquez</b> pour lâcher une planète<br/>
        Deux planètes <b>identiques</b> fusionnent<br/>en une plus grande !<br/>
        Ne laissez pas dépasser la <b>ligne rouge</b>
      </div>
      <button class="btn" id="start-btn">▶ Jouer</button>
    </div>
    <div class="overlay" id="gameover-overlay" style="display:none">
      <h2 style="color:#f66">✕ GAME OVER</h2>
      <div class="score-big" id="final-score">0</div>
      <p id="final-best-text">Score enregistré !</p>
      <button class="btn" id="retry-btn">↺ Rejouer</button>
    </div>
  </div>
  <div class="side-panel">
    <div class="panel-box"><h3>Planètes</h3><div id="legend"></div></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
window.addEventListener('load', function() {
(function(){
'use strict';
const PLANETS=[
  {name:'Météorite',r:12,color:'#8899bb',glow:'#aab',points:1},
  {name:'Luna',r:18,color:'#c8d8f0',glow:'#def',points:3},
  {name:'Mercure',r:24,color:'#b8a090',glow:'#dba',points:6},
  {name:'Mars',r:32,color:'#cc5533',glow:'#f86',points:10},
  {name:'Vénus',r:40,color:'#e8c060',glow:'#fd8',points:15},
  {name:'Terre',r:50,color:'#3388cc',glow:'#6bf',points:21},
  {name:'Neptune',r:60,color:'#3355dd',glow:'#58f',points:28},
  {name:'Uranus',r:72,color:'#66ddcc',glow:'#8fc',points:36},
  {name:'Saturne',r:84,color:'#ddbb66',glow:'#fb8',points:45},
  {name:'Jupiter',r:98,color:'#cc8855',glow:'#e96',points:55},
  {name:'Soleil',r:114,color:'#ffdd22',glow:'#ff8',points:100},
];
const SPAWN_POOL=[0,1,2,3,4];
const W=Math.min(380,window.innerWidth-180);
const H=Math.min(580,window.innerHeight-130);
const WALL_T=20,DANGER_Y=70;

const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;
const nextCanvas=document.getElementById('next-canvas');
const nextCtx=nextCanvas.getContext('2d');
const cursorCanvas=document.getElementById('cursor-planet');
cursorCanvas.width=W; cursorCanvas.height=H;
cursorCanvas.style.width=W+'px'; cursorCanvas.style.height=H+'px';
const cursorCtx=cursorCanvas.getContext('2d');
document.getElementById('canvas-container').style.width=W+'px';
document.getElementById('canvas-container').style.height=H+'px';
document.getElementById('drop-line').style.height=H+'px';
document.getElementById('danger-line').style.top=DANGER_Y+'px';

const {Engine,Bodies,Events,World}=Matter;
const engine=Engine.create({gravity:{y:2.2}});
const world=engine.world;
World.add(world,[
  Bodies.rectangle(W/2,H+WALL_T/2,W*2,WALL_T,{isStatic:true,label:'wall'}),
  Bodies.rectangle(-WALL_T/2,H/2,WALL_T,H*2,{isStatic:true,label:'wall'}),
  Bodies.rectangle(W+WALL_T/2,H/2,WALL_T,H*2,{isStatic:true,label:'wall'}),
]);

let score=0,best=parseInt(localStorage.getItem('lp_best')||'0');
let currentIdx=rndSpawn(),nextIdx=rndSpawn();
let mouseX=W/2,gameRunning=false,canDrop=true;
let bodies=[],mergeQueue=[];
let goTimeout=null,goPending=false;

document.getElementById('score-val').textContent=score;
document.getElementById('best-val').textContent=best;

// Stars
(function(){
  const sc=document.getElementById('stars');
  sc.width=window.innerWidth; sc.height=window.innerHeight;
  const sCtx=sc.getContext('2d');
  const stars=Array.from({length:200},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.4,a:Math.random(),speed:0.002+Math.random()*0.006}));
  function anim(){
    sCtx.clearRect(0,0,sc.width,sc.height);
    const t=Date.now()*0.001;
    stars.forEach(s=>{
      const alpha=0.3+0.7*Math.abs(Math.sin(t*s.speed+s.a*100));
      sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
      sCtx.fillStyle='rgba(200,220,255,'+alpha+')'; sCtx.fill();
    });
    requestAnimationFrame(anim);
  }
  anim();
})();

// Legend
(function(){
  const el=document.getElementById('legend');
  PLANETS.forEach((p,i)=>{
    if(i>7)return;
    const div=document.createElement('div'); div.className='legend-item';
    const c=document.createElement('canvas'); c.width=14; c.height=14; c.style.borderRadius='50%';
    drawP(c.getContext('2d'),7,7,6,i);
    const span=document.createElement('span'); span.textContent=p.name;
    div.appendChild(c); div.appendChild(span); el.appendChild(div);
  });
})();

function lighten(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgb('+Math.min(255,r+a)+','+Math.min(255,g+a)+','+Math.min(255,b+a)+')';}
function darken(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgb('+Math.max(0,r-a)+','+Math.max(0,g-a)+','+Math.max(0,b-a)+')';}

function drawP(c,x,y,r,idx){
  const p=PLANETS[idx];
  const grd=c.createRadialGradient(x,y,r*0.2,x,y,r*1.8);
  grd.addColorStop(0,p.glow+'55'); grd.addColorStop(1,'transparent');
  c.beginPath(); c.arc(x,y,r*1.8,0,Math.PI*2); c.fillStyle=grd; c.fill();
  const grad=c.createRadialGradient(x-r*0.3,y-r*0.3,r*0.05,x,y,r);
  grad.addColorStop(0,lighten(p.color,60)); grad.addColorStop(0.5,p.color); grad.addColorStop(1,darken(p.color,40));
  c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle=grad; c.fill();
  c.beginPath(); c.arc(x-r*0.28,y-r*0.28,r*0.28,0,Math.PI*2); c.fillStyle='rgba(255,255,255,0.25)'; c.fill();
  if(idx===8){c.save();c.translate(x,y);c.scale(1,0.3);c.beginPath();c.arc(0,0,r*1.55,0,Math.PI*2);c.strokeStyle='rgba(220,180,80,0.55)';c.lineWidth=r*0.25;c.stroke();c.restore();}
  if(idx===10){const sg=c.createRadialGradient(x,y,r,x,y,r*2.5);sg.addColorStop(0,'rgba(255,230,50,0.4)');sg.addColorStop(1,'transparent');c.beginPath();c.arc(x,y,r*2.5,0,Math.PI*2);c.fillStyle=sg;c.fill();}
}

function drawNext(){
  nextCtx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  drawP(nextCtx,nextCanvas.width/2,nextCanvas.height/2,Math.min(PLANETS[nextIdx].r,34),nextIdx);
}

function drawCursor(x){
  cursorCtx.clearRect(0,0,W,H);
  if(!gameRunning||!canDrop)return;
  const p=PLANETS[currentIdx];
  const cx=Math.max(p.r+WALL_T,Math.min(W-p.r-WALL_T,x));
  drawP(cursorCtx,cx,DANGER_Y+p.r+4,p.r,currentIdx);
  cursorCtx.beginPath(); cursorCtx.moveTo(cx,DANGER_Y+p.r*2+4); cursorCtx.lineTo(cx,H);
  cursorCtx.strokeStyle='rgba(100,180,255,0.15)'; cursorCtx.setLineDash([4,8]); cursorCtx.lineWidth=1; cursorCtx.stroke(); cursorCtx.setLineDash([]);
  document.getElementById('drop-line').style.left=cx+'px';
}

function rndSpawn(){return SPAWN_POOL[Math.floor(Math.random()*SPAWN_POOL.length)];}

function spawnPlanet(x){
  if(!canDrop||!gameRunning)return;
  canDrop=false;
  const idx=currentIdx;
  const p=PLANETS[idx];
  const cx=Math.max(p.r+WALL_T,Math.min(W-p.r-WALL_T,x));
  const body=Bodies.circle(cx,DANGER_Y+p.r+4,p.r,{restitution:0.3,friction:0.6,frictionAir:0.008,density:0.002*(idx+1),label:'planet_'+idx});
  body._typeIdx=idx; body._justSpawned=true;
  bodies.push({body,typeIdx:idx}); World.add(world,body);
  currentIdx=nextIdx; nextIdx=rndSpawn(); drawNext();
  setTimeout(()=>{body._justSpawned=false;canDrop=true;drawCursor(mouseX);},600);
}

Events.on(engine,'collisionStart',function(event){
  if(!gameRunning)return;
  event.pairs.forEach(pair=>{
    const aE=bodies.find(b=>b.body===pair.bodyA);
    const bE=bodies.find(b=>b.body===pair.bodyB);
    if(!aE||!bE||aE.typeIdx!==bE.typeIdx)return;
    if(aE.body._justSpawned||bE.body._justSpawned||aE.body._merging||bE.body._merging)return;
    aE.body._merging=true; bE.body._merging=true;
    mergeQueue.push({a:aE,b:bE});
  });
});

function processMerges(){
  if(!mergeQueue.length)return;
  mergeQueue.forEach(({a,b})=>{
    const idx=a.typeIdx;
    const mx=(a.body.position.x+b.body.position.x)/2;
    const my=(a.body.position.y+b.body.position.y)/2;
    rmPlanet(a); rmPlanet(b);
    if(idx>=PLANETS.length-1){addScore(PLANETS[idx].points*3,{x:mx,y:my});flash({x:mx,y:my},idx);return;}
    const ni=idx+1;
    const nb=Bodies.circle(mx,my,PLANETS[ni].r,{restitution:0.3,friction:0.6,frictionAir:0.008,density:0.002*(ni+1),label:'planet_'+ni});
    nb._typeIdx=ni; bodies.push({body:nb,typeIdx:ni}); World.add(world,nb);
    addScore(PLANETS[ni].points,{x:mx,y:my}); flash({x:mx,y:my},ni);
  });
  mergeQueue=[];
}

function rmPlanet(e){bodies=bodies.filter(b=>b!==e);World.remove(world,e.body);}

function addScore(pts,pos){
  score+=pts;
  document.getElementById('score-val').textContent=score;
  if(score>best){best=score;localStorage.setItem('lp_best',best);document.getElementById('best-val').textContent=best;}
  const popup=document.createElement('div');
  popup.className='score-popup'; popup.textContent='+'+pts;
  popup.style.left=(pos.x-10)+'px'; popup.style.top=(pos.y-20)+'px';
  document.getElementById('canvas-container').appendChild(popup);
  setTimeout(()=>popup.remove(),1000);
}

function flash(pos,idx){
  const p=PLANETS[idx];
  const el=document.createElement('div'); el.className='merge-flash';
  el.style.cssText='width:'+p.r*2+'px;height:'+p.r*2+'px;left:'+pos.x+'px;top:'+pos.y+'px;background:radial-gradient(circle,'+p.glow+'88 0%,transparent 70%);border:2px solid '+p.glow+'aa;';
  document.getElementById('canvas-container').appendChild(el);
  setTimeout(()=>el.remove(),500);
}

function checkGO(){
  if(!gameRunning)return;
  const over=bodies.some(({body})=>!body._justSpawned&&!body._merging&&body.position.y-PLANETS[body._typeIdx].r<DANGER_Y);
  if(over){if(!goPending){goPending=true;goTimeout=setTimeout(doGO,800);}}
  else{if(goPending){clearTimeout(goTimeout);goPending=false;}}
}

function doGO(){
  gameRunning=false; canDrop=false;
  document.getElementById('final-score').textContent=score;
  const prev=parseInt(localStorage.getItem('lp_best')||'0');
  document.getElementById('final-best-text').textContent=score>=prev?'🏆 Nouveau record !':'Meilleur : '+prev;
  document.getElementById('gameover-overlay').style.display='flex';
  cursorCtx.clearRect(0,0,W,H);
}

function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030820'); bg.addColorStop(1,'#010410');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,60,60,0.04)'; ctx.fillRect(0,0,W,DANGER_Y);
  bodies.forEach(({body,typeIdx})=>{
    ctx.save(); ctx.translate(body.position.x,body.position.y); ctx.rotate(body.angle);
    drawP(ctx,0,0,PLANETS[typeIdx].r,typeIdx); ctx.restore();
  });
  ctx.fillStyle='rgba(60,100,180,0.08)';
  ctx.fillRect(0,0,WALL_T,H); ctx.fillRect(W-WALL_T,0,WALL_T,H);
  ctx.beginPath(); ctx.moveTo(0,DANGER_Y); ctx.lineTo(W,DANGER_Y);
  ctx.strokeStyle='rgba(255,80,80,0.35)'; ctx.lineWidth=1; ctx.setLineDash([8,6]); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,100,100,0.5)'; ctx.font='10px Exo 2,sans-serif'; ctx.fillText('DANGER',4,DANGER_Y-4);
}

let lastTime=0;
function loop(ts){
  const delta=Math.min(ts-lastTime,50); lastTime=ts;
  if(gameRunning){Engine.update(engine,delta);processMerges();checkGO();}
  render(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

const cont=document.getElementById('canvas-container');
cont.addEventListener('mousemove',e=>{mouseX=e.clientX-canvas.getBoundingClientRect().left;drawCursor(mouseX);});
cont.addEventListener('mouseleave',()=>cursorCtx.clearRect(0,0,W,H));
cont.addEventListener('click',e=>{if(!gameRunning||!canDrop)return;mouseX=e.clientX-canvas.getBoundingClientRect().left;spawnPlanet(mouseX);});
cont.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX-canvas.getBoundingClientRect().left;drawCursor(mouseX);},{passive:false});
cont.addEventListener('touchend',e=>{e.preventDefault();if(!gameRunning||!canDrop)return;spawnPlanet(mouseX);},{passive:false});

function startGame(){
  bodies.forEach(({body})=>World.remove(world,body));
  bodies=[];mergeQueue=[];score=0;goPending=false;canDrop=true;
  document.getElementById('score-val').textContent=0;
  document.getElementById('best-val').textContent=localStorage.getItem('lp_best')||0;
  currentIdx=rndSpawn();nextIdx=rndSpawn();drawNext();
  document.getElementById('start-overlay').style.display='none';
  document.getElementById('gameover-overlay').style.display='none';
  gameRunning=true; drawCursor(mouseX);
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',()=>{if(gameRunning)startGame();});
drawNext();
})();
}); // end window load
</script>
</body>
</html>
